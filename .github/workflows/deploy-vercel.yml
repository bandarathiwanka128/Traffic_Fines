name: Deploy to Vercel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deployment configuration notice
        if: env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == ''
        run: echo "Vercel deployment skipped until VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID are configured."

      - name: Pull Vercel project settings
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel deployment
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
